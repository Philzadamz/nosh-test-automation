name: Nosh E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run automatically every Monday at 8:00 AM UTC
  schedule:
    - cron: "0 8 * * 1"
  # Allow running manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  cypress-run:
    name: Run Cypress Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Run Cypress tests ──────────────────────────────
      - name: Run Cypress tests
        id: cypress
        uses: cypress-io/github-action@v6
        with:
          command: npm run cy:run
        env:
          CYPRESS_USER_EMAIL: ${{ secrets.CYPRESS_USER_EMAIL }}
          CYPRESS_USER_PASSWORD: ${{ secrets.CYPRESS_USER_PASSWORD }}
        continue-on-error: true

      # ── 5. Upload HTML report as artifact ─────────────────
      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report
          path: cypress/reports/
          retention-days: 30

      # ── 6. Upload screenshots on failure ──────────────────
      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 30

      # ── 7. Deploy report to GitHub Pages ──────────────────
      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: cypress/reports
          destination_dir: reports

      # ── 8. Send email report ──────────────────────────────
      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENTS }}
          from: Nosh E2E Tests <${{ secrets.MAIL_USERNAME }}>
          subject: "Nosh E2E Test Report — ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }} (${{ github.run_number }})"
          body: |
            Nosh Automation Test Run #${{ github.run_number }}
            ─────────────────────────────────────
            Status   : ${{ job.status }}
            Branch   : ${{ github.ref_name }}
            Triggered: ${{ github.event_name }}
            Run date : ${{ github.run_id }}

            📊 View full HTML report:
            https://philzadamz.github.io/nosh-test-automation/reports/

            🔗 View run details on GitHub:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ─────────────────────────────────────
            This is an automated message from GitHub Actions.