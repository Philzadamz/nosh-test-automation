name: Nosh E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow running manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  cypress-run:
    name: Run Cypress Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Run Cypress tests ──────────────────────────────
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          # Use the existing cy:run script (also triggers the reporter)
          command: npm run cy:run
        env:
          # Pass credentials from GitHub Secrets (see README for setup)
          CYPRESS_USER_EMAIL: ${{ secrets.CYPRESS_USER_EMAIL }}
          CYPRESS_USER_PASSWORD: ${{ secrets.CYPRESS_USER_PASSWORD }}
        # Keep running even if tests fail so the report still gets published
        continue-on-error: true

      # ── 5. Upload HTML report as artifact ─────────────────
      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report
          path: cypress/reports/
          retention-days: 30

      # ── 6. Upload screenshots on failure ──────────────────
      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 30

      # ── 7. Deploy report to GitHub Pages ──────────────────
      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: cypress/reports
          destination_dir: reports